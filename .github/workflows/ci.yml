name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      # uv is needed by tests/e2e live-binary smoke (Python MCP fixture).
      # The test skips itself when uv isn't found, so this is best-effort.
      - uses: astral-sh/setup-uv@v3
        if: matrix.os != 'windows-latest'
        with:
          version: latest
      - run: go test ./... -race -count=1
        shell: bash
