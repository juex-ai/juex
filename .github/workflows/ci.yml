name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Prepare embedded web dist
        run: |
          mkdir -p internal/web/dist
          printf '<!doctype html><html><body></body></html>' > internal/web/dist/index.html
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      # uv is needed by tests/e2e live-binary smoke (Python MCP fixture).
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - name: Prepare embedded web dist
        run: |
          mkdir -p internal/web/dist
          printf '<!doctype html><html><body></body></html>' > internal/web/dist/index.html
        shell: bash
      - run: go test ./... -race -count=1
        shell: bash
