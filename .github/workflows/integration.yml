name: integration
on:
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: write live config files
        env:
          ANTHROPIC_ID:    ${{ secrets.PROVIDER_API_ID_ANTHROPIC }}
          ANTHROPIC_TYPE:  ${{ secrets.PROVIDER_API_TYPE_ANTHROPIC }}
          ANTHROPIC_PROTOCOL: ${{ secrets.PROVIDER_API_PROTOCOL_ANTHROPIC }}
          ANTHROPIC_BASE:  ${{ secrets.PROVIDER_API_BASE_ANTHROPIC }}
          ANTHROPIC_KEY:   ${{ secrets.PROVIDER_API_KEY_ANTHROPIC }}
          ANTHROPIC_MODEL: ${{ secrets.PROVIDER_API_MODEL_ANTHROPIC }}
          OPENAI_ID:       ${{ secrets.PROVIDER_API_ID_OPENAI }}
          OPENAI_TYPE:     ${{ secrets.PROVIDER_API_TYPE_OPENAI }}
          OPENAI_PROTOCOL: ${{ secrets.PROVIDER_API_PROTOCOL_OPENAI }}
          OPENAI_BASE:     ${{ secrets.PROVIDER_API_BASE_OPENAI }}
          OPENAI_KEY:      ${{ secrets.PROVIDER_API_KEY_OPENAI }}
          OPENAI_MODEL:    ${{ secrets.PROVIDER_API_MODEL_OPENAI }}
        run: |
          mkdir -p .juex
          cat > .juex/juex.minimax.yaml <<EOF
          provider:
            id: "$ANTHROPIC_ID"
            type: "$ANTHROPIC_TYPE"
            protocol: "$ANTHROPIC_PROTOCOL"
            base_url: "$ANTHROPIC_BASE"
            api_key: "$ANTHROPIC_KEY"
            model: "$ANTHROPIC_MODEL"
          EOF
          cat > .juex/juex.qwen.yaml <<EOF
          provider:
            id: "$OPENAI_ID"
            type: "$OPENAI_TYPE"
            protocol: "$OPENAI_PROTOCOL"
            base_url: "$OPENAI_BASE"
            api_key: "$OPENAI_KEY"
            model: "$OPENAI_MODEL"
          EOF
      - run: go test -tags=integration ./tests/e2e/... -v -count=1
