{{define "content"}}<table>
  <thead><tr><th>id</th><th>last active</th><th>turns</th><th>preview</th></tr></thead>
  <tbody>
    {{range .Sessions}}
    <tr>
      <td><a href="/sessions/{{.ID}}">{{.ID}}</a></td>
      <td>{{.LastActiveAt.Format "2006-01-02 15:04"}}</td>
      <td>{{.Turns}}</td>
      <td>{{.Preview}}</td>
    </tr>
    {{else}}
    <tr><td colspan="4">(no sessions)</td></tr>
    {{end}}
  </tbody>
</table>{{end}}
{{template "layout" .}}
