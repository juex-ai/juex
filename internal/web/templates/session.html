{{define "content"}}
<div class="session" data-session-id="{{.Info.ID}}">
  <header class="session-meta">
    <span><strong>id:</strong> <code>{{.Info.ID}}</code></span>
    <span><strong>turns:</strong> <span id="turns-count">{{.Info.Turns}}</span></span>
    <span><strong>last active:</strong> {{.Info.LastActiveAt.Format "2006-01-02 15:04:05"}}</span>
  </header>

  <section id="messages" class="messages" aria-live="polite"></section>

  <footer class="composer">
    <form id="prompt-form">
      <textarea name="prompt" rows="3" placeholder="Type a prompt…"></textarea>
      <div class="composer-row">
        <span id="status" class="status status-idle"><span class="status-dot"></span>idle</span>
        <div class="composer-actions">
          <button type="button" id="interrupt-btn" class="btn-interrupt">Interrupt</button>
          <button type="submit" class="btn-send">Send</button>
        </div>
      </div>
    </form>
  </footer>
</div>

<script>
  juexInitSession({{.Info.ID}});
</script>
{{end}}
{{template "layout" .}}
