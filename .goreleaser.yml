project_name: juex
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: juex
    main: ./cmd/juex
    binary: juex
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X github.com/juex-ai/juex/internal/version.Version={{.Version}}
      - -X github.com/juex-ai/juex/internal/version.Commit={{.ShortCommit}}
      - -X github.com/juex-ai/juex/internal/version.BuildTime={{.Date}}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64, arm]
    goarm: ["7"]
    ignore:
      # 32-bit arm only ships on linux; darwin and windows have no
      # consumer hardware target for it.
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm

archives:
  - id: juex
    # `{{ .Arm }}` resolves to the GOARM number on arm builds (empty
    # otherwise), so a v7 archive becomes juex_X.Y.Z_linux_armv7.tar.gz.
    # This makes the ABI explicit so users on ARMv6 devices know to skip it.
    name_template: "{{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}{{if .Arm}}v{{.Arm}}{{end}}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    # GoReleaser adds README/LICENSE by default when files is empty.
    # Use a glob that should not match anything so archives contain only juex.
    files:
      - none*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: juex-ai
    name: juex
  draft: false
  prerelease: auto
